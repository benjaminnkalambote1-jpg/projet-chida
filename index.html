<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chida-shop | Catalogue Luxe</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    
    <style>
        /* === STYLE GLOBAL === */
        body { font-family: 'Segoe UI', sans-serif; background-color: #DEB887; color: #f5f5f5; margin: 0; padding: 0; overflow-x: hidden; }
        
        header { 
            background-color: #000; 
            color: #fff; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .header-left { display: flex; align-items: center; }
        .logo { width: 45px; height: 45px; margin-right: 12px; border-radius: 50%; object-fit: cover; border: 1px solid gold; }
        h1 { margin: 0; font-size: 1.2rem; letter-spacing: 1px; }

        .cart-info { text-align: right; line-height: 1.2; }
        #total-display { color: gold; font-weight: bold; font-size: 1rem; }

        /* Titres des sections */
        .section-title {
            padding: 15px 20px 5px;
            font-size: 1.1rem;
            color: #000;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* === SLIDER HORIZONTAL === */
        .product-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 15px;
            padding: 10px 20px 20px;
            scrollbar-width: none;
        }

        .product-slider::-webkit-scrollbar { display: none; }

        .product { 
            flex: 0 0 200px; 
            scroll-snap-align: start;
            background-color: #222; 
            border-radius: 15px; 
            padding: 15px; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .product img { width: 100%; border-radius: 10px; margin-bottom: 10px; height: 160px; object-fit: cover; }
        .price-tag { color: gold; font-weight: bold; font-size: 1.1rem; margin: 5px 0; }

        .btn-add { background-color: gold; color: #000; border: none; padding: 10px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-remove { background-color: #444; color: #ccc; border: none; padding: 5px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 5px; font-size: 0.7rem; }

        /* FORMULAIRE */
        .order-form {
            background-color: #111;
            padding: 20px;
            max-width: 450px;
            margin: 20px auto 30px;
            border-radius: 15px;
            border: 2px solid gold;
        }
        .order-form h3 { color: gold; text-align: center; margin-top: 0; }
        .order-form input {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border-radius: 8px;
            border: 1px solid #333;
            background: #222;
            color: white;
            box-sizing: border-box;
        }

        #whatsapp-btn {
            background-color: #e60000; /* Changé en rouge pour M-Pesa */
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        footer { text-align: center; padding: 20px; color: #666; font-size: 0.7rem; background: #000; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="casquette6.jpg" alt="Logo" class="logo">
            <h1>Chida-shop</h1>
        </div>
        <div class="cart-info">
            🛒 <span id="item-count">0</span> articles<br>
            <span id="total-display">Total : 0$</span>
        </div>
    </header>

    <div class="section-title">🔥 Nouveautés</div>
    <div class="product-slider">
        <div class="product" data-price="50" data-name="Casquette Rouge">
            <img src="casquette4.jpeg" alt="Rouge">
            <h3>Rouge Luxe</h3>
            <div class="price-tag">50$</div>
            <button class="btn-add">Ajouter</button>
            <button class="btn-remove">Retirer</button>
        </div>
        
        <div class="product" data-price="60" data-name="Casquette Bleue">
            <img src="casquette3.jpeg" alt="Bleue">
            <h3>Bleue Royal</h3>
            <div class="price-tag">60$</div>
            <button class="btn-add">Ajouter</button>
            <button class="btn-remove">Retirer</button>
        </div>

        <div class="product" data-price="55" data-name="Casquette Verte">
            <img src="casquette2.jpeg" alt="Verte">
            <h3>Verte Urban</h3>
            <div class="price-tag">55$</div>
            <button class="btn-add">Ajouter</button>
            <button class="btn-remove">Retirer</button>
        </div>
        </div>

    <section class="order-form">
        <h3>📍 Livraison & Paiement</h3>
        <input type="text" id="name" placeholder="Nom Complet" required>
        <input type="tel" id="phone" placeholder="N° M-Pesa (ex: 243...)" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="address" placeholder="Adresse complète" required>
        
        <button id="whatsapp-btn">
            💳 PAYER VIA M-PESA
        </button>
    </section>

    <footer>© 2026 Chida-shop | Kinshasa</footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script>
        let count = 0; let total = 0; let itemsOrdered = [];
        const countLabel = document.getElementById('item-count');
        const totalLabel = document.getElementById('total-display');

        document.querySelectorAll('.btn-add').forEach(btn => {
            btn.addEventListener('click', () => {
                const parent = btn.parentElement;
                const price = parseInt(parent.getAttribute('data-price'));
                const name = parent.getAttribute('data-name');
                count++; total += price; itemsOrdered.push(name);
                updateUI();
                Toastify({
                    text: `✨ ${name} ajouté (+${price}$)`,
                    duration: 2000,
                    style: { background: "linear-gradient(to right, #000, #D4AF37)", borderRadius: "10px", border: "1px solid gold", color: "white" }
                }).showToast();
            });
        });

        document.querySelectorAll('.btn-remove').forEach(btn => {
            btn.addEventListener('click', () => {
                const parent = btn.parentElement;
                const price = parseInt(parent.getAttribute('data-price'));
                const name = parent.getAttribute('data-name');
                if (count > 0 && itemsOrdered.includes(name)) {
                    count--; total -= price;
                    itemsOrdered.splice(itemsOrdered.indexOf(name), 1);
                    updateUI();
                    Toastify({ text: `❌ ${name} retiré`, duration: 2000, style: { background: "#444", borderRadius: "10px" } }).showToast();
                }
            });
        });

        function updateUI() { countLabel.textContent = count; totalLabel.textContent = "Total : " + total + "$"; }

        // --- SEULE MODIFICATION : APPEL VERCEL ---
        document.getElementById('whatsapp-btn').addEventListener('click', async () => {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const address = document.getElementById('address').value;

            if (count === 0 || !name || !phone || !email || !address) {
                Toastify({ text: "Vérifie tes infos et ton panier !", style: { background: "orange", color: "black" } }).showToast();
                return;
            }

            try {
                const response = await fetch("https://boutique-pay.vercel.app/api/pay", {
                    method: "POST",
                    body: JSON.stringify({
                        amount: total,
                        phone: phone,
                        email: email
                    })
                });

                const result = await response.json();

                if (result.status === "ACCEPTED" || result.status === "SUBMITTED") {
                    alert("🚀 Succès ! Valide le paiement sur ton téléphone.");
                } else {
                    alert("Erreur : " + (result.message || "Paiement refusé"));
                }
            } catch (err) {
                alert("Impossible de joindre le serveur de paiement.");
            }
        });
    </script>
</body>
</html>
