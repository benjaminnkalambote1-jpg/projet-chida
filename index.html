<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chida-shop : La meilleure boutique de casquettes de luxe. Livraison rapide.">
    
    <title>Boutique Casquettes Luxe</title>
    <meta name="google-site-verification" content="7KzkKgCe6XSMA8od42XhpvIu2nViHOlHHDvXRXuW7As" />
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

    <style>
        /* === Style Luxe (Ton code original) === */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #DEB887; 
            color: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #000000;
            color: #FFFFFF;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            flex-wrap: wrap;
            z-index: 1000;
        }

        .header-left { display: flex; align-items: center; }

        .logo {
            width: 50px;
            height: auto;
            margin-right: 10px;
            border-radius: 50%;
        }

        .cart { font-size: 18px; display: flex; flex-direction: column; align-items: flex-end; }
        .cart span { font-weight: bold; color: gold; border: 1px solid gold; padding: 2px 8px; border-radius: 50%; margin-left: 5px; }
        .total-price { color: #fff; font-size: 0.9rem; margin-top: 5px; font-weight: bold; }

        main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 30px;
            gap: 20px;
        }

        .product {
            background-color: #222;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            padding: 20px;
            text-align: center;
            width: 220px;
            transition: transform 0.3s;
            overflow: hidden;
        }

        .product:hover { transform: translateY(-5px); }

        .product img {
            width: 100%;
            border-radius: 10px;
            transition: transform 0.5s ease;
        }

        .product h2 { color: #f5f5f5; margin: 10px 0 5px; }
        .product p { color: gold; font-weight: bold; margin-bottom: 15px; }

        .add-to-cart {
            background-color: gold;
            color: #111;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            width: 100%;
            margin-bottom: 8px;
        }

        .remove-from-cart {
            background-color: #444;
            color: #ccc;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            width: 100%;
            transition: 0.3s;
        }

        .remove-from-cart:hover { background-color: #aa0000; color: white; }

        .whatsapp-sticky {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25D366;
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 2000;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #111;
            color: #aaa;
            padding-bottom: 80px;
        }

        @media (max-width: 600px) {
            main { padding: 15px; }
            .product { width: 85%; }
            .whatsapp-sticky span { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <img src="casquette6.jpg" alt="Logo" class="logo">
            <h1>Chida-shop</h1>
        </div>
        <div class="cart">
            <div>🛒 Panier : <span id="count">0</span></div>
            <div class="total-price" id="total">Total : 0$</div>
        </div>
    </header>

    <main>
        <div class="product" data-price="50">
            <img src="casquette4.jpeg" alt="Casquette Rouge">
            <h2>Casquette Rouge</h2>
            <p>50$</p>
            <button class="add-to-cart">Ajouter au panier</button>
            <button class="remove-from-cart">Retirer</button>
        </div>

        <div class="product" data-price="60">
            <img src="casquette3.jpeg" alt="Casquette Bleue">
            <h2>Casquette Bleue</h2>
            <p>60$</p>
            <button class="add-to-cart">Ajouter au panier</button>
            <button class="remove-from-cart">Retirer</button>
        </div>

        <div class="product" data-price="55">
            <img src="casquette2.jpeg" alt="Casquette Verte">
            <h2>Casquette Verte</h2>
            <p>55$</p>
            <button class="add-to-cart">Ajouter au panier</button>
            <button class="remove-from-cart">Retirer</button>
        </div>
    </main>

    <a href="https://wa.me/243995452975" class="whatsapp-sticky" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" style="width:30px;">
        <span>Discuter avec nous</span>
    </a>

    <footer>
        <p>© 2026 Chida-shop</p>
    </footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script>
        // --- LOGIQUE DU PANIER ---
        let cartCount = localStorage.getItem('panierChidaCount') ? parseInt(localStorage.getItem('panierChidaCount')) : 0;
        let totalPrice = localStorage.getItem('panierChidaPrice') ? parseInt(localStorage.getItem('panierChidaPrice')) : 0;

        const countSpan = document.getElementById('count');
        const totalSpan = document.getElementById('total');

        // Fonction pour mettre à jour l'affichage et la sauvegarde
        function updateUI() {
            countSpan.textContent = cartCount;
            totalSpan.textContent = "Total : " + totalPrice + "$";
            localStorage.setItem('panierChidaCount', cartCount);
            localStorage.setItem('panierChidaPrice', totalPrice);
        }

        // Affichage au démarrage
        updateUI();

        // Gestion Ajouter
        document.querySelectorAll('.add-to-cart').forEach(button => {
            button.addEventListener('click', () => {
                const price = parseInt(button.parentElement.getAttribute('data-price'));
                cartCount++;
                totalPrice += price;
                updateUI();

                Toastify({
                    text: "✨ Produit ajouté (" + price + "$)",
                    duration: 2000,
                    style: { background: "linear-gradient(to right, #000, #D4AF37)", borderRadius: "10px" }
                }).showToast();
            });
        });

        // Gestion Retirer
        document.querySelectorAll('.remove-from-cart').forEach(button => {
            button.addEventListener('click', () => {
                if (cartCount > 0) {
                    const price = parseInt(button.parentElement.getAttribute('data-price'));
                    // On ne retire que si le total permet de soustraire ce prix
                    if (totalPrice >= price) {
                        cartCount--;
                        totalPrice -= price;
                        updateUI();

                        Toastify({
                            text: "❌ Produit retiré (-" + price + "$)",
                            duration: 2000,
                            style: { background: "linear-gradient(to right, #555, #222)", borderRadius: "10px" }
                        }).showToast();
                    }
                }
            });
        });
    </script>
</body>
</html>
